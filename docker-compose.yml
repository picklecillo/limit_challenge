services:
  backend:
    build:
      context: ./backend
      target: test
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      DB_PATH: /app/data/db.sqlite3

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api
    depends_on:
      - backend
